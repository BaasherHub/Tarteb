name: Build APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview

defaults:
  run:
    working-directory: mobile

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_NO_TELEMETRY: 1
      SENTRY_DISABLE_AUTO_UPLOAD: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK with EAS
        run: eas build --platform android --profile ${{ github.event.inputs.profile }} --non-interactive

      - name: Download build artifact
        run: |
          echo "Downloading APK from EAS..."
          # EAS Build will automatically upload the APK
          # Check the build log for download link

      - name: Upload build link
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const buildLog = '${{ job.container.id }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ APK build complete!\n\nCheck the [EAS Dashboard](https://expo.dev/builds) for your APK download link.`
            })

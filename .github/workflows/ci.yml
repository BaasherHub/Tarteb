name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: mobile

jobs:
  mobile:
    name: Expo / React Native
    runs-on: ubuntu-latest

    env:
      EXPO_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      CI: true
      EXPO_NO_TELEMETRY: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Expo doctor
        run: npx expo-doctor

      # Lint: skipped — mobile/package.json has no "lint" script and no ESLint config yet.
